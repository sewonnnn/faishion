services:

  # =============================================================
  # MySQL 데이터베이스
  #   - 데이터는 볼륨에 영구 저장
  #   - healthcheck로 DB 준비 완료 후 backend 시작
  #   - dump.sql이 있으면 최초 실행 시 자동 import (볼륨이 비어있을 때만)
  # =============================================================
  mysql:
    image: mysql:8.0
    container_name: faishion-mysql
    environment:
      MYSQL_DATABASE: faishion_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./dump.sql:/docker-entrypoint-initdb.d/dump.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================================
  # Spring Boot 백엔드
  #   - 환경변수는 .env 파일에서 주입
  #   - 이미지 업로드 파일은 볼륨에 영구 저장
  #   - mysql healthcheck 통과 후 시작
  # =============================================================
  backend:
    image: ghcr.io/sewonnnn/faishion-backend:latest
    container_name: faishion-backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/faishion_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      BIZ_API_KEY: ${BIZ_API_KEY}
      IMAGE_UPLOAD_DIR: /upload/
    volumes:
      - ./upload:/upload
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # =============================================================
  # nginx (프론트엔드 + SSL + API 프록시)
  #   - React 정적 파일 서빙
  #   - HTTP(80) → HTTPS(443) 리다이렉트
  #   - /api/ 요청을 backend로 프록시
  #   - SSL 인증서는 서버의 Let's Encrypt 경로를 read-only 마운트
  # =============================================================
  frontend:
    image: ghcr.io/sewonnnn/faishion-frontend:latest
    container_name: faishion-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Let's Encrypt 인증서 마운트 (live: 심볼릭 링크, archive: 실제 파일)
      - /etc/letsencrypt/live/${DOMAIN}:/etc/nginx/ssl:ro
      - /etc/letsencrypt/archive/${DOMAIN}:/etc/archive/${DOMAIN}:ro
    depends_on:
      - backend
    restart: unless-stopped

# =============================================================
# 볼륨 정의
# =============================================================
volumes:
  mysql-data:   # MySQL 데이터 영구 저장
